ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Used Claude for architecture discussion, debugging the rule-based scoring
  pipeline, fixing a JD-parsing bug (binary .docx misread as plain text),
  removing hardcoded job-title/role logic in favor of evidence-based AI/ML
  relevance scoring, building the Gradio app.py UI for HuggingFace Spaces
  deployment, and code review throughout. No candidate data was fed to any
  LLM outside this development environment.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Hybrid candidate ranker combining rule-based scoring (70%) with bi-encoder
  semantic search (30%, BAAI/bge-small-en-v1.5 + FAISS). Pipeline: honeypot
  filter removes implausible profiles, a relevance pre-filter scores AI/ML
  evidence dynamically from JD-extracted skills overlapping candidate
  skills/career/project text (no hardcoded job titles), rule scoring covers
  skills (30%), career incl. production/retrieval evidence and progression
  (35%), location (10%), and behavioral availability signals (25%). Bi-encoder
  re-ranks the top rule-scored pool against the JD text via FAISS cosine
  similarity. Final hybrid score blends both. Reasoning is generated per
  candidate from actual matched skills, production company evidence, and
  signal scores — candidates with insufficient AI/ML evidence get an honest
  "Limited alignment" message instead of fabricated skill claims. Runtime
  scales with dataset size; ~10-15s for 100 candidates, well under 5 min
  on CPU for the full 100K pool.

